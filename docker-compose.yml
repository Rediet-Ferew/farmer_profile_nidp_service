services:
  farmer-profile-dedup:
    build:
      context: .
      args:
        OPENG2P_FASTAPI_COMMON_REF: ${OPENG2P_FASTAPI_COMMON_REF:-git+https://github.com/OpenG2P/openg2p-fastapi-common.git#subdirectory=openg2p-fastapi-common}
    image: openg2p-farmer-profile-dedup:latest
    env_file:
      - .env
    environment:
      COMMON_APP_HOST: ${COMMON_APP_HOST:-0.0.0.0}
      COMMON_APP_PORT: ${COMMON_APP_PORT:-8001}
    ports:
      - "${COMMON_APP_PORT:-8001}:${COMMON_APP_PORT:-8001}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port=os.getenv('COMMON_APP_PORT','8001'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
